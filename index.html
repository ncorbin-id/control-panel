<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulation Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Roboto+Slab:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="material-theme/css/light.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: var(--md-sys-color-background);
      color: var(--md-sys-color-on-background);

      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .wrapper {
      text-align: center;
      padding: 40px;
      background: var(--md-sys-color-surface-container-high);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      max-width: 420px;
      width: 90%;
    }

    h1 {
      margin-top: 0;
      font-size: 2.8rem;
      font-weight: 400;
      font-family: 'Roboto Slab', serif;
    }

    p {
      opacity: 0.8;
      margin-bottom: 24px;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@material/web/": "https://esm.run/@material/web/"
    }
  }
  </script>
</head>
<body>

  <div class="wrapper">
    <h1>tbd</h1>
    <p>Procedural training can mask a lack of understanding. That limitation becomes apparent when a system no longer behaves as expected. This experience illuminates that moment through a reimagining of an experiment from <a href="https://doi.org/10.1207/s15516709cog0803_3" target="_blank">Kieras and Bovair (1984)</a>.</p>

    <md-filled-button onclick="goToPanel()">Start</md-filled-button>
  </div>

  <script type="module">
    import '@material/web/all.js';
  </script>

  <script>
    function goToPanel() {
      window.location.href = "panel.html";
    }
  </script>

</body>
</html>
